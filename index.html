<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>LaundryKu Finance</title>
<meta name="description" content="Aplikasi laporan keuangan sederhana untuk UMKM laundry: catat kas masuk/keluar, lihat Laba Rugi dan Neraca otomatis.">
<meta name="theme-color" content="#16232E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LaundryKu">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app" style="display:none;">
  <header class="app-header">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F3F7F6" stroke-width="2"><circle cx="12" cy="12" r="7"/><path d="M9 12a3 3 0 0 0 4.5 2.6"/><circle cx="16" cy="8" r="1.4" fill="#C98A3B" stroke="none"/></svg>
    </div>
    <div class="titles">
      <div class="biz-name" id="bizName">LaundryKu Finance</div>
      <div class="tagline">Laporan keuangan UMKM laundry</div>
    </div>
  </header>

  <div class="app-body" id="appBody">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="app-main" id="appMain"></main>
  </div>

  <button class="fab-quick-action" id="fabQuickAction" aria-label="Aksi Cepat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- Firebase (compat build — works as plain scripts, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/reports.js"></script>
<script src="js/app.js"></script>
</body>
</html>
