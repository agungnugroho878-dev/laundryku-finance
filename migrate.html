<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Migrasi Data — LaundryKu Finance</title>
<style>
  body{ font-family:-apple-system,sans-serif; max-width:520px; margin:40px auto; padding:0 20px; color:#16232E; }
  h1{ font-size:20px; }
  .card{ background:#fff; border:1px solid #DDE5E3; border-radius:12px; padding:20px; margin-bottom:16px; }
  button{ background:#3E7CB1; color:#fff; border:none; padding:12px 20px; border-radius:8px; font-size:15px; cursor:pointer; width:100%; }
  button:disabled{ opacity:.5; }
  .log{ font-family:monospace; font-size:12.5px; background:#F3F7F6; border-radius:8px; padding:12px; margin-top:14px; white-space:pre-wrap; max-height:300px; overflow:auto; }
  .field{ margin-bottom:14px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  input{ width:100%; padding:10px; border-radius:8px; border:1px solid #DDE5E3; font-size:14px; box-sizing:border-box; }
  .warn{ background:#FBEBEA; color:#C1554D; padding:12px; border-radius:8px; font-size:13px; margin-bottom:16px; }
</style>
</head>
<body>
  <h1>Migrasi ke Sistem Multi-Usaha</h1>
  <div class="warn">Jalankan ini <b>hanya sekali</b>. Login dulu sebagai akun Owner sebelum lanjut. Setelah selesai, hapus/jangan pakai halaman ini lagi.</div>

  <div class="card">
    <div class="field">
      <label>Email Owner (login dulu)</label>
      <input type="email" id="mEmail" placeholder="email owner Anda">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="mPassword">
    </div>
    <div class="field">
      <label>Nama Usaha (untuk data lama ini)</label>
      <input type="text" id="mBizName" value="WashSpace">
    </div>
    <button id="runBtn">Jalankan Migrasi</button>
    <div class="log" id="log" style="display:none;"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const logBox = document.getElementById("log");
    function log(msg){
      logBox.style.display = "block";
      logBox.textContent += msg + "\n";
      logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById("runBtn").addEventListener("click", async () => {
      const btn = document.getElementById("runBtn");
      btn.disabled = true;
      const email = document.getElementById("mEmail").value.trim();
      const password = document.getElementById("mPassword").value;
      const bizName = document.getElementById("mBizName").value.trim() || "Usaha Saya";

      try{
        log("Login...");
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const uid = cred.user.uid;
        log("Login berhasil: " + cred.user.email);

        const userDoc = await fs.collection("users").doc(uid).get();
        if(userDoc.exists && userDoc.data().businessId){
          log("Akun ini SUDAH punya businessId (" + userDoc.data().businessId + "). Migrasi sudah pernah dijalankan. Berhenti.");
          btn.disabled = false;
          return;
        }

        log("Membuat data usaha baru: " + bizName + " ...");
        const bizRef = fs.collection("businesses").doc();
        const businessId = bizRef.id;
        await bizRef.set({ name: bizName, ownerUid: uid, createdAt: Date.now() });
        log("Business ID: " + businessId);

        log("Memindahkan pengaturan lama (settings)...");
        const settingsSnap = await fs.collection("settings").get();
        const settingsData = {};
        settingsSnap.docs.forEach(d => { settingsData[d.id] = d.data().value; });
        await fs.collection("businessSettings").doc(businessId).set(settingsData);
        log("Pengaturan dipindahkan: " + Object.keys(settingsData).join(", "));

        const collections = ["transactions", "orders", "members", "categories"];
        for(const name of collections){
          log("Migrasi koleksi: " + name + " ...");
          const snap = await fs.collection(name).get();
          let count = 0;
          const docs = snap.docs.filter(d => !d.data().businessId);
          for(let i = 0; i < docs.length; i += 400){
            const batch = fs.batch();
            docs.slice(i, i+400).forEach(d => {
              batch.update(d.ref, { businessId });
              count++;
            });
            await batch.commit();
          }
          log("  -> " + count + " dokumen diberi businessId");
        }

        log("Update akun Owner Anda...");
        await fs.collection("users").doc(uid).set({
          name: (userDoc.exists ? userDoc.data().name : email.split("@")[0]),
          email, role: "owner", businessId, createdAt: Date.now()
        }, { merge: true });

        log("");
        log("SELESAI! Silakan logout dan login ulang di aplikasi utama.");
        btn.textContent = "Selesai";
      }catch(err){
        log("ERROR: " + err.message);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
